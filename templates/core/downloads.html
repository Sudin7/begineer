{% extends "base.html" %}

{% block title %}Downloads{% endblock %}

{% block content %}
<section class="downloads" style="padding:80px 120px;">
    <h1>Downloads</h1>
    <div class="grid" style="margin-top:40px; gap:24px;">
        {% for item in files %}
            <div class="card">
                <h2>{{ item.title }}</h2>
                <p>{{ item.description }}</p>
                <a class="btn" href="{{ item.file.url }}" download>Download</a>
            </div>
        {% empty %}
            <p>There are no downloadable files yet.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
